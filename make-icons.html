<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>介護福祉士 アイコン生成</title></head>
<body style="font-family:sans-serif;padding:20px;background:#11211f;color:#e2efe9;">
<h2 style="color:#2dd4bf;">介護福祉士 アイコン生成</h2>
<canvas id="c192" width="192" height="192" style="border:1px solid #2a4a44;margin:8px;"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #2a4a44;margin:8px;width:128px;height:128px;"></canvas>
<br>
<button onclick="dl('c192','icon-192.png')" style="margin:6px;padding:8px 16px;background:#2dd4bf;color:#11211f;border:none;cursor:pointer;font-weight:700;">icon-192.png をダウンロード</button>
<button onclick="dl('c512','icon-512.png')" style="margin:6px;padding:8px 16px;background:#2dd4bf;color:#11211f;border:none;cursor:pointer;font-weight:700;">icon-512.png をダウンロード</button>
<script>
function draw(id){
  const c=document.getElementById(id); const s=c.width; const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,s,s); g.addColorStop(0,'#11211f'); g.addColorStop(1,'#1a3a34');
  const r=s*0.18; ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(s-r,0);ctx.quadraticCurveTo(s,0,s,r);ctx.lineTo(s,s-r);ctx.quadraticCurveTo(s,s,s-r,s);ctx.lineTo(r,s);ctx.quadraticCurveTo(0,s,0,s-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.clip();
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
  // ハート（手のひらに寄り添うイメージ）
  ctx.fillStyle='rgba(251,146,60,0.85)';
  ctx.beginPath();
  const hx=s*0.5, hy=s*0.30, hs=s*0.11;
  ctx.moveTo(hx,hy+hs*0.9);
  ctx.bezierCurveTo(hx-hs*1.4,hy-hs*0.6, hx-hs*0.5,hy-hs*1.3, hx,hy-hs*0.2);
  ctx.bezierCurveTo(hx+hs*0.5,hy-hs*1.3, hx+hs*1.4,hy-hs*0.6, hx,hy+hs*0.9);
  ctx.fill();
  // 介
  ctx.fillStyle='#2dd4bf'; ctx.font=`bold ${s*0.3}px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(45,212,191,0.5)'; ctx.shadowBlur=s*0.06;
  ctx.fillText('介護', s*0.5, s*0.6);
  ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font=`bold ${s*0.12}px sans-serif`;
  ctx.fillText('福祉士', s*0.5, s*0.82);
}
function dl(id,name){ const c=document.getElementById(id); const a=document.createElement('a'); a.download=name; a.href=c.toDataURL('image/png'); a.click(); }
draw('c192'); draw('c512');
</script>
</body>
</html>
